accounts:
  - account_id: "123456789012"
    name: "Production"
    role_name: "EC2RightsizingAnalyzerRole"
    regions:
      - us-east-1
      - us-west-2
  
  - account_id: "987654321098"
    name: "Development"
    role_name: "EC2RightsizingAnalyzerRole"
