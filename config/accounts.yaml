settings:
  metrics_lookback_days: 14
  
  thresholds:
    cpu_high: 80
    cpu_low: 20
    memory_high: 80
    memory_low: 20
  
  min_savings_threshold: 50
  
  allowed_families:
    - m5
    - m6i
    - c5
    - c6i
    - r5
    - r6i
    - t3
    - t4g
